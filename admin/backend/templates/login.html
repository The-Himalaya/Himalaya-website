<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | The Himalaya Admin</title>
  <link rel="icon" type="image/png" href="/assets/logo.png">
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            himalaya: { black: '#011a2e', navy: '#014871', mint: '#D7EDE2', teal: '#9ecfba', white: '#f0f9f6' }
          }
        }
      }
    }
  </script>
  <style>
    * { font-family: 'DM Sans', sans-serif; }
    .font-display { font-family: 'Bebas Neue', sans-serif; letter-spacing: 0.02em; }
  </style>
</head>
<body class="min-h-screen bg-gradient-to-br from-himalaya-black to-himalaya-navy flex items-center justify-center p-4">
  <div class="fixed inset-0 opacity-5">
    <div class="absolute inset-0" style="background-image: url('data:image/svg+xml,%3Csvg width=60 height=60 viewBox=%220 0 60 60%22 xmlns=%22http://www.w3.org/2000/svg%22%3E%3Cg fill=%22none%22 fill-rule=%22evenodd%22%3E%3Cg fill=%22%23ffffff%22 fill-opacity=%221%22%3E%3Cpath d=%22M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z%22/%3E%3C/g%3E%3C/g%3E%3C/svg%3E');"></div>
  </div>

  <div class="relative w-full max-w-md">
    <div class="bg-white rounded-2xl shadow-2xl overflow-hidden">
      <div class="bg-gradient-to-r from-himalaya-navy to-himalaya-teal p-8 text-center">
        <img src="/assets/logo.png" alt="The Himalaya" class="h-20 mx-auto mb-4">
        <h1 class="font-display text-3xl text-white">ADMIN PANEL</h1>
        <p class="text-white/70 text-sm mt-1">The Himalaya Infrastructure Products</p>
      </div>

      <div class="p-8">
        <div id="error-box" class="hidden mb-6 p-3 bg-red-50 border border-red-200 rounded-lg flex items-center gap-2 text-sm text-red-700">
          <svg class="w-5 h-5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
          <span id="error-msg">Invalid email or password</span>
        </div>

        <form id="login-form" class="space-y-5">
          <div>
            <label class="block text-sm font-semibold text-himalaya-black mb-1.5">Email</label>
            <input id="email" type="email" required autofocus
              class="w-full px-4 py-3 rounded-lg border border-gray-200 bg-gray-50 text-sm focus:outline-none focus:ring-2 focus:ring-himalaya-navy/20 focus:border-himalaya-navy focus:bg-white transition-all"
              placeholder="admin@thehimalaya.com">
          </div>
          <div>
            <label class="block text-sm font-semibold text-himalaya-black mb-1.5">Password</label>
            <input id="password" type="password" required
              class="w-full px-4 py-3 rounded-lg border border-gray-200 bg-gray-50 text-sm focus:outline-none focus:ring-2 focus:ring-himalaya-navy/20 focus:border-himalaya-navy focus:bg-white transition-all"
              placeholder="Enter your password">
          </div>
          <button id="submit-btn" type="submit"
            class="w-full bg-himalaya-navy text-white py-3 rounded-lg font-semibold text-sm hover:bg-himalaya-black transition-colors focus:outline-none focus:ring-2 focus:ring-himalaya-navy/50 disabled:opacity-60 disabled:cursor-not-allowed">
            Sign In
          </button>
        </form>
      </div>
    </div>
    <p class="text-center text-white/30 text-xs mt-6">&copy; 2026 The Himalaya Infrastructure Products. All rights reserved.</p>
  </div>

  <!-- Firebase JS SDK -->
  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.14.1/firebase-app.js';
    import { getAuth, signInWithEmailAndPassword } from 'https://www.gstatic.com/firebasejs/10.14.1/firebase-auth.js';

    const firebaseConfig = {
      apiKey:     "{{ firebase_api_key }}",
      authDomain: "{{ firebase_auth_domain }}",
      projectId:  "{{ firebase_project_id }}",
    };

    const app  = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    const form      = document.getElementById('login-form');
    const btn       = document.getElementById('submit-btn');
    const errorBox  = document.getElementById('error-box');
    const errorMsg  = document.getElementById('error-msg');

    function showError(msg) {
      errorMsg.textContent = msg;
      errorBox.classList.remove('hidden');
      errorBox.classList.add('flex');
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorBox.classList.add('hidden');
      btn.disabled = true;
      btn.textContent = 'Signing in…';

      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      try {
        const cred    = await signInWithEmailAndPassword(auth, email, password);
        const idToken = await cred.user.getIdToken();

        // Exchange ID token for an HTTP-only session cookie via backend
        const body = new FormData();
        body.append('id_token', idToken);

        const res = await fetch('/admin/session', { method: 'POST', body });
        const data = await res.json();

        if (res.ok) {
          window.location.href = '/admin/dashboard';
        } else {
          showError(data.error || 'Access denied.');
          btn.disabled = false;
          btn.textContent = 'Sign In';
        }
      } catch (err) {
        const messages = {
          'auth/user-not-found':  'No account found with this email.',
          'auth/wrong-password':  'Incorrect password.',
          'auth/invalid-email':   'Invalid email address.',
          'auth/too-many-requests': 'Too many attempts. Please try again later.',
        };
        showError(messages[err.code] || 'Sign in failed. Check your credentials.');
        btn.disabled = false;
        btn.textContent = 'Sign In';
      }
    });
  </script>
</body>
</html>
